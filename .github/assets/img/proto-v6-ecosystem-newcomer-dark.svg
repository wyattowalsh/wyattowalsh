<path d="M405.5,372.3 Q406.5,373.8 407.2,373.6" fill="none" stroke="#882700" stroke-width="1.10" opacity="0.156" stroke-linecap="round" class="branch-path" style="--op:0.156;animation-delay:12.3s"/>
<path d="M405.5,372.3 Q405.8,373.7 404.7,374.2" fill="none" stroke="#882700" stroke-width="1.10" opacity="0.156" stroke-linecap="round" class="branch-path" style="--op:0.156;animation-delay:12.3s"/>
</g>
</g>
<circle cx="400.0" cy="400.0" r="3" fill="#40b1b6" opacity="0.5"/>
<rect width="800" height="800" fill="url(#vig)"/>
</svg>
