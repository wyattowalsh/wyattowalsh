name: Generate QR code contact card
on:
  workflow_dispatch:
    inputs:
      token:
        description: 'GitHub Personal Access Token'
        required: true
        default: ${{ secrets.GITHUB_TOKEN }}
      COMMIT_MESSAGE:
        required: false
        description: "Git commit message"
        default: "chore: update QR code via GitHub Actions"
jobs:
  qr:
    name: Generate QR Code
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13 and uv
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'uv'
    - name: Install dependencies
      run: uv pip install .[qr]
    - name: Generate QR code
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python3 scripts/qr.py
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: ${{ github.event.inputs.COMMIT_MESSAGE || 'chore: update QR code via GitHub Actions' }}
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"
        commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

