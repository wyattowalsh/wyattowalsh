<svg xmlns="http://www.w3.org/2000/svg" width="480" height="280" viewBox="0 0 480 280" role="img" aria-labelledby="title desc">
  <title id="title">Additional metrics status card</title>
  <desc id="desc">Clean fallback card for additional profile metrics panels while live enrichments are being refreshed.</desc>
  <rect width="480" height="280" rx="18" fill="#0d1117"/>
  <rect x="18" y="18" width="444" height="244" rx="14" fill="#111827" stroke="#1f2937"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" fill="#e5e7eb">
    <text x="36" y="60" font-size="28" font-weight="700">Additional Metrics</text>
    <text x="36" y="90" font-size="15" fill="#93c5fd">Live enrichment panels are being refreshed.</text>

    <g font-size="15" fill="#cbd5e1">
      <text x="36" y="132">Working now</text>
      <text x="52" y="158">• Main profile metrics card on the left</text>
      <text x="52" y="182">• README metrics section visibility on main</text>

      <text x="36" y="220">Next healthy run will repopulate</text>
      <text x="52" y="246">• Recent activity, stargazers, music, and other enrichments</text>
    </g>
  </g>
</svg>
