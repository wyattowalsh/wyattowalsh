name: Unified Profile Updater

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *" # Run once a day at 1 AM UTC
  push:
    branches:
      - master
      - main
      - dev

concurrency:
  group: profile-updater-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-starred-lists:
    name: Update Starred Repository Lists (MD Files)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # To commit languages.md and topics.md
    outputs:
      starred_lists_changed: ${{ steps.commit_starred_lists.outputs.changes_detected }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install script-tools dependencies
        run: uv sync --extra script-tools

      - name: Get repository name
        id: get_repo_name
        run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Update repo category by language
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ steps.get_repo_name.outputs.REPOSITORY_NAME }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          uv run starred --username ${USERNAME} --repository ${REPOSITORY} --sort \
            --message 'chore(data): update awesome-stars languages.md' \
            --filename ./.github/assets/languages.md

      - name: Update repo category by topic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ steps.get_repo_name.outputs.REPOSITORY_NAME }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          uv run starred --username ${USERNAME} --repository ${REPOSITORY} --sort \
            --message 'chore(data): update awesome-stars topics.md' \
            --topic --topic_limit 500 \
            --filename ./.github/assets/topics.md

      - name: Commit updated starred lists
        id: commit_starred_lists
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(data): update awesome-stars lists (languages.md, topics.md)"
          file_pattern: ".github/assets/languages.md .github/assets/topics.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  generate-assets:
    name: Generate Profile Assets (QR, WordClouds, Banner)
    runs-on: ubuntu-latest
    needs: update-starred-lists # Depends on the md files being up-to-date
    timeout-minutes: 45
    permissions:
      contents: write # To commit generated image assets
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with: # Ensure we fetch the commit made by update-starred-lists if it ran
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install asset generation dependencies
        run: uv sync --extra qr --extra word-clouds

      - name: Generate QR Code
        run: uv run python -m scripts.cli generate qr --config-path config.yaml

      - name: Generate Word Cloud by Topic
        run: |
          uv run python -m scripts.cli generate word-cloud \
            --config-path config.yaml \
            --from-topics-md \
            --output-path .github/assets/img/wordcloud_metaheuristic-anim_by_topics.svg

      - name: Generate Word Cloud by Language
        run: |
          uv run python -m scripts.cli generate word-cloud \
            --config-path config.yaml \
            --from-languages-md \
            --output-path .github/assets/img/wordcloud_metaheuristic-anim_by_languages.svg

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(assets): update generated profile assets"
          file_pattern: ".github/assets/img/qr*.png .github/assets/img/wordcloud_*.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  update-readme-wakatime:
    name: Update README - WakaTime Stats
    runs-on: ubuntu-latest
    needs: generate-event-art
    if: ${{ always() && !cancelled() }}
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Preflight WakaTime auth gate
        id: wakatime_auth
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          set -euo pipefail
          has_wakatime_api_key=false
          [ -n "${WAKATIME_API_KEY:-}" ] && has_wakatime_api_key=true
          echo "has_wakatime_api_key=${has_wakatime_api_key}" >> "$GITHUB_OUTPUT"
          if [ "${has_wakatime_api_key}" != "true" ]; then
            echo "::notice::WAKATIME_API_KEY is missing; skipping WakaTime README update."
          fi
      - name: WakaTime Readme Stats
        if: ${{ steps.wakatime_auth.outputs.has_wakatime_api_key == 'true' }}
        uses: anmol098/waka-readme-stats@2c04c57e0ee35e9e40aef7fbc7d866d063dcf7cd # v4
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PUSH_BRANCH_NAME: ${{ github.ref_name }} # Removed invalid input
          # ... other params from your waka.yml ...
          SHOW_LINES_OF_CODE: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "True"

  generate-profile-metrics:
    name: Generate Profile Metrics SVGs
    runs-on: ubuntu-latest
    needs: update-starred-lists
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
      - name: Install metrics helper dependencies
        run: uv sync --locked
      - name: Preflight metrics auth gates
        id: metrics_auth
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          # Secret setup guidance:
          # - METRICS_TOKEN: GitHub PAT (classic) with at least read:user, public_repo (add read:org for org/collab visibility).
          has_metrics_token=false
          [ -n "${METRICS_TOKEN:-}" ] && has_metrics_token=true
          has_spotify_tokens=false
          if [ -n "${SPOTIFY_CLIENT_ID:-}" ] && [ -n "${SPOTIFY_CLIENT_SECRET:-}" ] && [ -n "${SPOTIFY_REFRESH_TOKEN:-}" ]; then
            has_spotify_tokens=true
          fi
          echo "has_metrics_token=${has_metrics_token}" >> "$GITHUB_OUTPUT"
          echo "has_spotify_tokens=${has_spotify_tokens}" >> "$GITHUB_OUTPUT"
          if [ "${has_metrics_token}" != "true" ]; then
            echo "::notice::METRICS_TOKEN is missing; repositories-sensitive metrics are disabled."
          fi
          if [ "${has_spotify_tokens}" != "true" ]; then
            echo "::notice::Spotify secrets are incomplete; music metrics are disabled."
          fi
      - name: Back up existing metrics assets
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/metrics-backups"

          backup_metric() {
            local source_path="$1"
            local backup_path="$2"

            if [ -f "$source_path" ]; then
              cp "$source_path" "$backup_path"
              echo "::notice::Backed up $(basename "$source_path") to ${backup_path}."
            else
              rm -f "$backup_path"
              echo "::notice::No existing $(basename "$source_path") asset found to back up."
            fi
          }

          backup_metric ./.github/assets/img/metrics.svg "$RUNNER_TEMP/metrics-backups/metrics.svg"
          backup_metric ./.github/assets/img/metrics.additional.svg "$RUNNER_TEMP/metrics-backups/metrics.additional.svg"
      - name: Personal metrics
        id: personal_metrics
        continue-on-error: true
        uses: felipecrs/metrics@b300bc3a0fcf0fa3cbb101064948c0f2126c3f25 # forked-3.34.0
        with:
          output_action: none
          filename: .github/assets/img/metrics.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'header, activity, community, repositories, metadata' || 'header, activity, community, metadata' }}
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_traffic: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_languages: yes
          plugin_languages_ignored: "jupyter%20notebook"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_threshold: "2%"
          plugin_habits: yes
          plugin_habits_from: 1000
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: "0%"
          plugin_notable: yes
          plugin_notable_repositories: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_gists: yes
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_limit: 15
          config_timezone: America/Los_Angeles
          config_padding: 10%

      - name: Validate personal metrics output
        id: validate_personal_metrics
        if: ${{ always() }}
        continue-on-error: true
        run: uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.svg

      - name: Personal metrics (fallback without repositories)
        if: ${{ steps.personal_metrics.outcome != 'success' || steps.validate_personal_metrics.outcome != 'success' }}
        continue-on-error: true
        uses: felipecrs/metrics@b300bc3a0fcf0fa3cbb101064948c0f2126c3f25 # forked-3.34.0
        with:
          output_action: none
          filename: .github/assets/img/metrics.svg
          token: ${{ github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: "header, activity, community, metadata"
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_traffic: no
          plugin_languages: yes
          plugin_languages_ignored: "jupyter%20notebook"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_threshold: "2%"
          # Drop flaky plugins here so fallback still renders a valid SVG.
          plugin_habits: no
          plugin_notable: yes
          plugin_notable_repositories: no
          plugin_gists: yes
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_limit: 15
          config_timezone: America/Los_Angeles
          config_padding: 10%
      - name: Recover personal metrics output
        id: recover_personal_metrics
        if: ${{ always() }}
        continue-on-error: true
        run: |
          uv run python -m scripts.metrics_svg recover \
            ./.github/assets/img/metrics.svg \
            --previous "$RUNNER_TEMP/metrics-backups/metrics.svg"

      - name: Personal metrics (additional)
        id: personal_metrics_additional
        continue-on-error: true
        uses: felipecrs/metrics@b300bc3a0fcf0fa3cbb101064948c0f2126c3f25 # forked-3.34.0
        with:
          output_action: none
          filename: .github/assets/img/metrics.additional.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          config_timezone: America/Los_Angeles
          config_padding: 10%
          plugin_music: ${{ steps.metrics_auth.outputs.has_spotify_tokens == 'true' && 'yes' || 'no' }}
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_token: "${{ secrets.SPOTIFY_CLIENT_ID }}, ${{ secrets.SPOTIFY_CLIENT_SECRET }}, ${{ secrets.SPOTIFY_REFRESH_TOKEN }}"
          plugin_music_limit: 5
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_days: 0
          plugin_activity_visibility: public
          plugin_activity_timestamps: yes
          plugin_stargazers: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_stargazers_charts: yes
          plugin_stars: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_stars_limit: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && '3' || '0' }}
          plugin_repositories: yes
          plugin_repositories_featured: "wyattowalsh/agents, wyattowalsh/nbadb, wyattowalsh/proxywhirl, wyattowalsh/mcp-crawl4ai, wyattowalsh/fl-mcp, wyattowalsh/listentropy, wyattowalsh/personal-website, wyattowalsh/mdxpad, wyattowalsh/ai-web-feeds"

      - name: Validate additional metrics output
        id: validate_additional_metrics
        if: ${{ always() }}
        continue-on-error: true
        run: uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.additional.svg

      - name: Personal metrics (additional fallback)
        if: ${{ steps.personal_metrics_additional.outcome != 'success' || steps.validate_additional_metrics.outcome != 'success' }}
        continue-on-error: true
        uses: felipecrs/metrics@b300bc3a0fcf0fa3cbb101064948c0f2126c3f25 # forked-3.34.0
        with:
          output_action: none
          filename: .github/assets/img/metrics.additional.svg
          token: ${{ github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          config_timezone: America/Los_Angeles
          config_padding: 10%
          # Keep fallback on the most stable public GitHub sections only.
          plugin_music: no
          plugin_activity: no
          plugin_stargazers: no
          plugin_stargazers_charts: no
          plugin_stars: no
          plugin_stars_limit: 0
          plugin_repositories: yes
          plugin_repositories_featured: "wyattowalsh/agents, wyattowalsh/nbadb, wyattowalsh/proxywhirl, wyattowalsh/mcp-crawl4ai, wyattowalsh/fl-mcp, wyattowalsh/listentropy, wyattowalsh/personal-website, wyattowalsh/mdxpad, wyattowalsh/ai-web-feeds"
      - name: Recover additional metrics output
        id: recover_additional_metrics
        if: ${{ always() }}
        continue-on-error: true
        run: |
          uv run python -m scripts.metrics_svg recover \
            ./.github/assets/img/metrics.additional.svg \
            --previous "$RUNNER_TEMP/metrics-backups/metrics.additional.svg"

      - name: Validate final metrics assets
        id: validate_final_metrics
        if: ${{ always() }}
        run: |
          set -euo pipefail
          uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.svg
          uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.additional.svg

      - name: Commit metrics outputs
        if: ${{ always() && steps.validate_final_metrics.outcome == 'success' }}
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(metrics): update generated metrics assets"
          file_pattern: ".github/assets/img/metrics.svg .github/assets/img/metrics.additional.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  generate-event-art:
    name: Generate Event-Driven Artwork
    runs-on: ubuntu-latest
    needs: generate-profile-metrics
    if: ${{ always() && needs.generate-profile-metrics.result != 'cancelled' }}
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install librsvg for GIF rasterization
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Prepare living-art staging directory
        run: |
          mkdir -p "$RUNNER_TEMP/living-art-stage/inputs"
          mkdir -p "$RUNNER_TEMP/living-art-stage/outputs"

      - name: Fetch metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          uv run python -m scripts.fetch_metrics \
            --owner "$OWNER" \
            --repo "$REPO_NAME" \
            --output "$RUNNER_TEMP/metrics.json"
          cp "$RUNNER_TEMP/metrics.json" "$RUNNER_TEMP/living-art-stage/inputs/metrics.json"

      - name: Fetch historical data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          uv run python -m scripts.fetch_history \
            --owner "$OWNER" \
            --repo "$REPO_NAME" \
            --output "$RUNNER_TEMP/history.json"
          cp "$RUNNER_TEMP/history.json" "$RUNNER_TEMP/living-art-stage/inputs/history.json"

      - name: Resolve living-art runtime contract constants
        run: |
          uv run python - <<'PY'
          import os
          from scripts.art.timelapse import (
              DEFAULT_PUBLISHED_MAX_FRAMES,
              MIN_PUBLISHED_RUNTIME_MS,
          )

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"LIVING_ART_MAX_FRAMES={DEFAULT_PUBLISHED_MAX_FRAMES}\n")
              env_file.write(f"LIVING_ART_MIN_RUNTIME_MS={MIN_PUBLISHED_RUNTIME_MS}\n")
          PY

      - name: Generate living-art outputs (canonical timelapse GIFs)
        env:
          OWNER: ${{ github.repository_owner }}
          LIVING_ART_MAX_FRAMES: "120"
          LIVING_ART_MIN_RUNTIME_MS: "24000"
        run: |
          uv run python -m scripts.cli generate living-art \
            --profile "$OWNER" \
            --metrics-path "$RUNNER_TEMP/metrics.json" \
            --history-path "$RUNNER_TEMP/history.json" \
            --max-frames "$LIVING_ART_MAX_FRAMES"

      - name: Validate living-art runtime and frame contracts
        env:
          LIVING_ART_MAX_FRAMES: "120"
          LIVING_ART_MIN_RUNTIME_MS: "24000"
        run: |
          uv run python - <<'PY'
          import os
          from pathlib import Path
          from PIL import Image, ImageSequence

          max_frames = int(os.environ["LIVING_ART_MAX_FRAMES"])
          min_runtime_ms = int(os.environ["LIVING_ART_MIN_RUNTIME_MS"])
          gif_paths = sorted(Path(".github/assets/img").glob("living-*.gif"))
          if not gif_paths:
              raise SystemExit("No living-art GIF outputs found for contract validation")

          print("Living-art runtime contract summary:")
          for gif_path in gif_paths:
              with Image.open(gif_path) as img:
                  durations = [max(1, frame.info.get("duration", 0)) for frame in ImageSequence.Iterator(img)]
              frame_count = len(durations)
              runtime_ms = sum(durations)
              print(f"- {gif_path.name}: frames={frame_count}, runtime_ms={runtime_ms}")
              if frame_count > max_frames:
                  raise SystemExit(
                      f"{gif_path.name} has {frame_count} frames, exceeds max contract {max_frames}"
                  )
              if runtime_ms < min_runtime_ms:
                  raise SystemExit(
                      f"{gif_path.name} runtime {runtime_ms}ms below contract floor {min_runtime_ms}ms"
                  )
          PY

      - name: Stage living-art timelapse outputs and index
        if: ${{ always() }}
        run: |
          shopt -s nullglob
          mkdir -p "$RUNNER_TEMP/living-art-stage/outputs/timelapse"
          mkdir -p "$RUNNER_TEMP/living-art-stage/outputs/index"
          mkdir -p "$RUNNER_TEMP/living-art-stage/outputs/docs-showcase"
          for file in .github/assets/img/living-*.gif; do
            cp "$file" "$RUNNER_TEMP/living-art-stage/outputs/timelapse/"
          done
          for file in .github/assets/img/living-art-manifest.json .github/assets/img/living-art-preview.html; do
            if [[ -f "$file" ]]; then
              cp "$file" "$RUNNER_TEMP/living-art-stage/outputs/index/"
            fi
          done
          for file in docs/public/showcase/living-*.gif; do
            cp "$file" "$RUNNER_TEMP/living-art-stage/outputs/docs-showcase/"
          done
          for file in docs/public/showcase/living-art-manifest.json docs/public/showcase/living-art-preview.html; do
            if [[ -f "$file" ]]; then
              cp "$file" "$RUNNER_TEMP/living-art-stage/outputs/docs-showcase/"
            fi
          done

      - name: Stage living-art outputs and manifest
        if: ${{ always() }}
        run: |
          {
            echo "# Living-art artifact summary"
            echo
            echo "## Inputs"
            find "$RUNNER_TEMP/living-art-stage/inputs" -type f | sort | while read -r file; do
              size=$(wc -c < "$file")
              echo "- $(basename "$file") (${size} bytes)"
            done
            echo
            echo "## Outputs"
            find "$RUNNER_TEMP/living-art-stage/outputs" -type f | sort | while read -r file; do
              size=$(wc -c < "$file")
              rel=${file#"$RUNNER_TEMP/living-art-stage/"}
              echo "- ${rel} (${size} bytes)"
            done
          } | tee "$RUNNER_TEMP/living-art-stage/manifest.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload living-art staging bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: living-art-stage-${{ github.run_id }}
          path: ${{ runner.temp }}/living-art-stage
          if-no-files-found: warn
          retention-days: 7

      - name: Commit generated art outputs
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "art: regenerate living-art assets"
          file_pattern: ".github/assets/img/living-*.gif .github/assets/img/living-art-manifest.json .github/assets/img/living-art-preview.html docs/public/showcase/living-*.gif docs/public/showcase/living-art-manifest.json docs/public/showcase/living-art-preview.html"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  update-skills:
    name: Finalize README Sections
    runs-on: ubuntu-latest
    needs: update-readme-wakatime
    if: ${{ always() && !cancelled() }}
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Generate README Sections
        run: uv run python -m scripts.cli generate readme-sections --config-path config.yaml

      - name: Generate Skills Badges
        run: uv run python -m scripts.cli generate skills --skills-path skills.yaml

      - name: Commit README updates
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(readme): update dynamic sections and skills badges"
          file_pattern: "README.md .github/assets/img/readme/*.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
