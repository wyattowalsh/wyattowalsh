<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="480" height="152" viewBox="0 0 480 152" role="img" aria-label="ProxyWhirl">
<defs><style>
:root {
  --card-bg: #ffffff;
