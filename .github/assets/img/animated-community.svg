<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
<defs>
<radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
  <stop offset="0%" stop-color="#f0f2f8">
    <animate attributeName="stop-color" values="#f0f2f8;#e8e0f0;#f0f2f8" dur="30.0s" repeatCount="indefinite"/>
  </stop>
  <stop offset="100%" stop-color="#e8eef5">
    <animate attributeName="stop-color" values="#e8eef5;#ddd0e8;#e8eef5" dur="30.0s" repeatCount="indefinite"/>
  </stop>
</radialGradient>
<filter id="glow"><feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
</defs>
<style>
  .cr{animation:cellReveal 0.8s ease-out both}
  @keyframes cellReveal{from{opacity:0}to{opacity:var(--o,0.8)}}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.85}}
  @keyframes milestonePulse{
    0%{r:5;opacity:.8;stroke-width:2}
    100%{r:50;opacity:0;stroke-width:.3}
  }
  @keyframes zoomOut{
    0%{transform:scale(1.45) translate(-15.5%,-15.5%)}
    100%{transform:scale(1) translate(0,0)}
  }
  @keyframes timelineFill{from{width:0}to{width:100%}}
  @keyframes bgWarm1{from{stop-color:#f0f2f8}to{stop-color:#e8e0f0}}
  @keyframes bgWarm2{from{stop-color:#e8eef5}to{stop-color:#ddd0e8}}
  @keyframes densityFlash{
    0%,90%{opacity:0}
    95%{opacity:.35}
    100%{opacity:0}
  }
  .zoom-wrap{
    animation:zoomOut 30.0s ease-in-out both;
    transform-origin:center center;
  }
</style>
