<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="480" height="175" viewBox="0 0 480 175" role="img" aria-label="personal-website">
<defs>
<style>
:root {
  --card-bg: transparent;
