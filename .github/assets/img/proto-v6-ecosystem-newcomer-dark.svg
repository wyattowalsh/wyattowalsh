<path d="M338.0,408.3 Q336.0,408.9 334.5,407.6" fill="none" stroke="#00607a" stroke-width="1.32" opacity="0.192" stroke-linecap="round" class="branch-path" style="--op:0.192;animation-delay:6.0s"/>
