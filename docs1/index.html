  <!-- Fix for scrolling issues -->
  <script>
    // Wait for Docsify to finish loading
    window.$docsify.plugins = [].concat(function(hook, vm) {
      hook.ready(function() {
        // Fix scrolling on main container elements
        document.body.style.overflow = 'auto';
        document.documentElement.style.overflow = 'auto';
        
        // If the #app element is created dynamically by Docsify
        let appElement = document.getElementById('app');
        if (appElement) {
          appElement.style.overflow = 'auto';
        }
        
        // Content area (created by Docsify)
        setTimeout(function() {
          let contentElements = document.querySelectorAll('.content');
          if (contentElements.length > 0) {
            contentElements.forEach(function(el) {
              el.style.overflow = 'auto';
            });
          }
        }, 1000); // Delay to ensure Docsify has created elements
      });
    }, window.$docsify.plugins || []);
  </script>
