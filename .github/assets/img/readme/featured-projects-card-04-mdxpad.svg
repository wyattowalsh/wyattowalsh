.card-icon { fill: #F8FAFC; font: 700 13px ui-sans-serif; }

.card-chip { fill: #0B1220; fill-opacity: 0.42; stroke: #60A5FA; stroke-opacity: 0.62; }
.card-chip-text { fill: #DBEAFE; font: 700 11px ui-sans-serif; }
.card-meta-row { fill: #B7C3D4; font: 500 13px ui-sans-serif; }
.sparkline { fill: none; stroke: #7DD3FC; stroke-width: 2; opacity: 0.88; }
.card[data-card-family="connect"][data-connect-variant="gh-card"] { --connect-accent-glow: rgba(125, 211, 252, 0.26); }
.connect-card-shell { filter: drop-shadow(0 0 8px var(--connect-accent-glow)); }
.connect-brand-lockup { isolation: isolate; }
</style>
