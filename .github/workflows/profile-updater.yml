name: Unified Profile Updater

on:
  workflow_dispatch:
    inputs:
      metrics_probe_mode:
        description: "Run only the manual full-metrics probe lane"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "0 1 * * *" # Run once a day at 1 AM UTC
  push:
    branches:
      - master
      - main
      - dev

concurrency:
  group: profile-updater-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  probe-full-metrics:
    name: Probe Full Metrics Surface
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.metrics_probe_mode == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install metrics helper dependencies
        run: uv sync --locked

      - name: Probe metrics credentials and upstream availability
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          set -euo pipefail

          github_scope_header="missing"
          if [ -n "${METRICS_TOKEN:-}" ]; then
            github_scope_header=$(curl -sS -D - -o /dev/null \
              -H "Authorization: Bearer ${METRICS_TOKEN}" \
              https://api.github.com/user \
              | tr -d '\r' \
              | awk -F': ' 'tolower($1) == "x-oauth-scopes" {print $2}' \
              | tail -n 1)
            [ -n "${github_scope_header}" ] || github_scope_header="present-but-empty"
          fi

          spotify_status="missing"
          spotify_error="n/a"
          if [ -n "${SPOTIFY_CLIENT_ID:-}" ] && [ -n "${SPOTIFY_CLIENT_SECRET:-}" ] && [ -n "${SPOTIFY_REFRESH_TOKEN:-}" ]; then
            spotify_response=$(curl -sS -w '\n%{http_code}' -X POST https://accounts.spotify.com/api/token \
              -u "${SPOTIFY_CLIENT_ID}:${SPOTIFY_CLIENT_SECRET}" \
              -d grant_type=refresh_token \
              --data-urlencode "refresh_token=${SPOTIFY_REFRESH_TOKEN}")
            spotify_body=$(printf '%s\n' "${spotify_response}" | sed '$d')
            spotify_status=$(printf '%s\n' "${spotify_response}" | tail -n 1)
            spotify_error=$(printf '%s' "${spotify_body}" | sed -n 's/.*"error_description":"\([^"]*\)".*/\1/p')
            if [ -z "${spotify_error}" ]; then
              spotify_error=$(printf '%s' "${spotify_body}" | sed -n 's/.*"error":"\([^"]*\)".*/\1/p')
            fi
            [ -n "${spotify_error}" ] || spotify_error="ok"
          fi

          x_oauth1_status="missing"
          if [ -n "${X_API_KEY:-}" ] && [ -n "${X_API_KEY_SECRET:-}" ] && [ -n "${X_ACCESS_TOKEN:-}" ] && [ -n "${X_ACCESS_TOKEN_SECRET:-}" ]; then
            x_oauth1_status="present"
          fi

          {
            echo "### Metrics probe auth summary"
            echo
            echo "- GitHub token scopes: ${github_scope_header}"
            echo "- Spotify refresh status: ${spotify_status}"
            echo "- Spotify refresh detail: ${spotify_error}"
            echo "- X OAuth1 credentials: ${x_oauth1_status}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Probe full personal metrics
        id: probe_primary
        continue-on-error: true
        uses: felipecrs/metrics@b300bc3a0fcf0fa3cbb101064948c0f2126c3f25
        with:
          output_action: none
          filename: .github/assets/img/metrics.probe.primary.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: header, activity, community, repositories, metadata
          plugin_lines: no
          plugin_isocalendar: yes
          plugin_traffic: yes
          plugin_languages: yes
          plugin_languages_ignored: "jupyter%20notebook"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_threshold: "2%"
          plugin_habits: yes
          plugin_habits_from: 1000
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: "0%"
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_gists: no
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_limit: 15
          config_timezone: America/Los_Angeles
          config_padding: 10%

      - name: Collect full personal metrics output
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set -euo pipefail
          cp /metrics_renders/.github/assets/img/metrics.probe.primary.svg ./.github/assets/img/metrics.probe.primary.svg

      - name: Probe full additional metrics
        id: probe_additional
        continue-on-error: true
        uses: felipecrs/metrics@b300bc3a0fcf0fa3cbb101064948c0f2126c3f25
        with:
          output_action: none
          filename: .github/assets/img/metrics.probe.additional.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          config_timezone: America/Los_Angeles
          config_padding: 10%
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_limit: 5
          plugin_music_played_at: true
          plugin_music_token: ${{ secrets.SPOTIFY_CLIENT_ID }},${{ secrets.SPOTIFY_CLIENT_SECRET }},${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stars: yes
          plugin_stars_limit: 3
          plugin_repositories: yes
          plugin_repositories_featured: "wyattowalsh/agents, wyattowalsh/nbadb, wyattowalsh/proxywhirl, wyattowalsh/mcp-crawl4ai, wyattowalsh/fl-mcp, wyattowalsh/listentropy, wyattowalsh/personal-website, wyattowalsh/mdxpad, wyattowalsh/ai-web-feeds"
          plugin_tweets: no

      - name: Collect full additional metrics output
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set -euo pipefail
          cp /metrics_renders/.github/assets/img/metrics.probe.additional.svg ./.github/assets/img/metrics.probe.additional.svg

      - name: Validate probe outputs
        id: validate_probe_outputs
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set -euo pipefail
          uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.probe.primary.svg
          uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.probe.additional.svg

      - name: Summarize probe output markers
        if: ${{ always() }}
        run: |
          set -euo pipefail

          summarize_markers() {
            local asset_path="$1"
            shift
            local asset_name
            asset_name=$(basename "$asset_path")

            {
              echo "#### ${asset_name}"
              if [ ! -f "$asset_path" ]; then
                echo "- missing"
                echo
                return
              fi
              for marker in "$@"; do
                if grep -Fq "$marker" "$asset_path"; then
                  echo "- ${marker}: present"
                else
                  echo "- ${marker}: absent"
                fi
              done
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          }

          {
            echo "### Full metrics probe markers"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          summarize_markers ./.github/assets/img/metrics.probe.primary.svg \
            "Recent coding habits" \
            "Insufficient token scopes" \
            "Unexpected error"

          summarize_markers ./.github/assets/img/metrics.probe.additional.svg \
            "Recently played" \
            "Invalid refresh token" \
            "Recent activity" \
            "Featured repositories" \
            "Recently starred repositories" \
            "Stargazers" \
            "Unexpected error"

      - name: Upload full metrics probe artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: metrics-probe-${{ github.run_id }}
          path: |
            .github/assets/img/metrics.probe.primary.svg
            .github/assets/img/metrics.probe.additional.svg
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce probe success
        if: ${{ always() }}
        run: |
          set -euo pipefail
          [ "${{ steps.probe_primary.outcome }}" = "success" ]
          [ "${{ steps.probe_additional.outcome }}" = "success" ]
          [ "${{ steps.validate_probe_outputs.outcome }}" = "success" ]

  update-starred-lists:
    name: Update Starred Repository Lists (MD Files)
    if: ${{ github.event.inputs.metrics_probe_mode != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # To commit languages.md and topics.md
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install script-tools dependencies
        run: uv sync --extra script-tools

      - name: Update repo category by language
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          temp_file="$RUNNER_TEMP/languages.md"
          uv run starred --username "${USERNAME}" --sort > "$temp_file"
          mv "$temp_file" ./.github/assets/languages.md

      - name: Update repo category by topic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          temp_file="$RUNNER_TEMP/topics.md"
          uv run starred --username "${USERNAME}" --sort \
            --topic --topic_limit 500 > "$temp_file"
          mv "$temp_file" ./.github/assets/topics.md

      - name: Commit updated starred lists
        id: commit_starred_lists
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail

          owned_files=(./.github/assets/languages.md ./.github/assets/topics.md)
          if [ -z "$(git status --porcelain --untracked-files=all -- "${owned_files[@]}")" ]; then
            echo "No starred list changes to commit."
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- "${owned_files[@]}"
          git commit -m "chore(data): update awesome-stars lists (languages.md, topics.md)"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push starred list commit after ${attempt} attempts."
              exit 1
            fi

            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
          done

  generate-assets:
    name: Generate Profile Assets (QR, WordClouds, Banner)
    runs-on: ubuntu-latest
    needs: update-starred-lists # Depends on the md files being up-to-date
    if: ${{ github.event.inputs.metrics_probe_mode != 'true' && always() && !cancelled() }}
    timeout-minutes: 60
    permissions:
      contents: write # To commit generated image assets
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with: # Ensure we fetch the commit made by update-starred-lists if it ran
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install asset generation dependencies
        run: uv sync --extra qr --extra word-clouds

      - name: Generate QR Code
        run: uv run python -m scripts.cli generate qr --config-path config.yaml

      - name: Generate Word Cloud by Topic
        run: |
          uv run python -m scripts.cli generate word-cloud \
            --config-path config.yaml \
            --from-topics-md \
            --output-path .github/assets/img/wordcloud_typographic_by_topics.svg

      - name: Generate Word Cloud by Language
        run: |
          uv run python -m scripts.cli generate word-cloud \
            --config-path config.yaml \
            --from-languages-md \
            --output-path .github/assets/img/wordcloud_typographic_by_languages.svg

      - name: Commit generated assets
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          owned_files=(.github/assets/img/qr*.png .github/assets/img/wordcloud_*.svg .github/assets/img/banner*.svg)
          if [ "${#owned_files[@]}" -eq 0 ]; then
            echo "::error::No generated asset files matched expected patterns."
            exit 1
          fi

          if [ -z "$(git status --porcelain --untracked-files=all -- "${owned_files[@]}")" ]; then
            echo "No generated asset changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- "${owned_files[@]}"
          git commit -m "chore(assets): update generated profile assets"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push generated asset commit after ${attempt} attempts."
              exit 1
            fi

            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
          done

  update-readme-wakatime:
    name: Update README - WakaTime Stats
    runs-on: ubuntu-latest
    needs: generate-event-art
    if: ${{ github.event.inputs.metrics_probe_mode != 'true' && always() && !cancelled() && (github.event_name != 'push' || github.event.head_commit.message != 'Updated with Dev Metrics') }}
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
      - name: Preflight WakaTime auth gate
        id: wakatime_auth
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          has_wakatime_api_key=false
          has_gh_token=false
          [ -n "${WAKATIME_API_KEY:-}" ] && has_wakatime_api_key=true
          [ -n "${GH_TOKEN:-}" ] && has_gh_token=true
          echo "has_wakatime_api_key=${has_wakatime_api_key}" >> "$GITHUB_OUTPUT"
          echo "has_gh_token=${has_gh_token}" >> "$GITHUB_OUTPUT"
          if [ "${has_wakatime_api_key}" != "true" ] || [ "${has_gh_token}" != "true" ]; then
            echo "::notice::WAKATIME_API_KEY or GH_TOKEN is missing; skipping WakaTime README update."
          fi
      - name: WakaTime Readme Stats
        if: ${{ steps.wakatime_auth.outputs.has_wakatime_api_key == 'true' && steps.wakatime_auth.outputs.has_gh_token == 'true' }}
        uses: anmol098/waka-readme-stats@2c04c57e0ee35e9e40aef7fbc7d866d063dcf7cd # v4
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_LINES_OF_CODE: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "False"

  generate-profile-metrics:
    name: Generate Profile Metrics SVGs
    if: ${{ github.event.inputs.metrics_probe_mode != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0
      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
      - name: Install metrics helper dependencies
        run: uv sync --locked
      - name: Preflight metrics auth gates
        id: metrics_auth
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          set -euo pipefail
          # Secret setup guidance:
          # - METRICS_TOKEN: GitHub PAT (classic) with at least read:user, public_repo (add read:org for org/collab visibility).
          has_metrics_token=false
          [ -n "${METRICS_TOKEN:-}" ] && has_metrics_token=true
          has_spotify_tokens=false
          if [ -n "${SPOTIFY_CLIENT_ID:-}" ] && [ -n "${SPOTIFY_CLIENT_SECRET:-}" ] && [ -n "${SPOTIFY_REFRESH_TOKEN:-}" ]; then
            has_spotify_tokens=true
          fi
          has_x_oauth1_tokens=false
          if [ -n "${X_API_KEY:-}" ] && [ -n "${X_API_KEY_SECRET:-}" ] && [ -n "${X_ACCESS_TOKEN:-}" ] && [ -n "${X_ACCESS_TOKEN_SECRET:-}" ]; then
            has_x_oauth1_tokens=true
          fi
          echo "has_metrics_token=${has_metrics_token}" >> "$GITHUB_OUTPUT"
          echo "has_spotify_tokens=${has_spotify_tokens}" >> "$GITHUB_OUTPUT"
          echo "has_x_oauth1_tokens=${has_x_oauth1_tokens}" >> "$GITHUB_OUTPUT"
          if [ "${has_metrics_token}" != "true" ]; then
            echo "::notice::METRICS_TOKEN is missing; repositories-sensitive metrics are disabled."
          fi
          if [ "${has_spotify_tokens}" != "true" ]; then
            echo "::notice::Spotify secrets are incomplete; music metrics are disabled."
          fi
          if [ "${has_x_oauth1_tokens}" != "true" ]; then
            echo "::notice::X OAuth1 secrets are incomplete; latest posts metrics are disabled."
          fi
      - name: Back up existing metrics assets
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/metrics-backups"

          backup_metric() {
            local source_path="$1"
            local backup_path="$2"

            if [ -f "$source_path" ]; then
              cp "$source_path" "$backup_path"
              echo "::notice::Backed up $(basename "$source_path") to ${backup_path}."
            else
              rm -f "$backup_path"
              echo "::notice::No existing $(basename "$source_path") asset found to back up."
            fi
          }

          backup_metric ./.github/assets/img/metrics.svg "$RUNNER_TEMP/metrics-backups/metrics.svg"
          backup_metric ./.github/assets/img/metrics.additional.svg "$RUNNER_TEMP/metrics-backups/metrics.additional.svg"
          rm -f ./.github/assets/img/metrics.svg ./.github/assets/img/metrics.additional.svg
      - name: Personal metrics
        id: lowlighter_metrics_primary
        continue-on-error: true
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          output_action: none
          filename: .github/assets/img/metrics.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: header, activity, community, metadata
          # Disabled until upstream handles bot/system authors without throwing.
          plugin_lines: no
          plugin_isocalendar: yes
          plugin_traffic: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_languages: yes
          plugin_languages_ignored: "jupyter%20notebook"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_threshold: "2%"
          # The habits panel still emits inline errors in upstream renders; use
          # the repo-owned supplemental card instead.
          plugin_habits: no
          plugin_habits_from: 1000
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: "0%"
          plugin_notable: yes
          plugin_notable_repositories: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          # GitHub Actions tokens cannot read gists reliably for this account.
          plugin_gists: no
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_limit: 15
          config_timezone: America/Los_Angeles
          config_padding: 10%

      - name: Collect personal metrics output
        id: collect_personal_metrics
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set -euo pipefail
          cp /metrics_renders/.github/assets/img/metrics.svg ./.github/assets/img/metrics.svg

      - name: Validate personal metrics output
        id: validate_personal_metrics
        if: ${{ always() }}
        continue-on-error: true
        run: uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.svg

      - name: Recover personal metrics output
        id: recover_personal_metrics
        if: ${{ always() }}
        run: |
          uv run python -m scripts.metrics_svg recover \
            ./.github/assets/img/metrics.svg \
            --previous "$RUNNER_TEMP/metrics-backups/metrics.svg"

      - name: Personal metrics (additional)
        id: lowlighter_metrics_additional
        continue-on-error: true
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          output_action: none
          filename: .github/assets/img/metrics.additional.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          config_timezone: America/Los_Angeles
          config_padding: 10%
          # Keep this card on stable GitHub-native panels; spotify currently breaks
          # the action build before rendering completes.
          plugin_music: no
          plugin_activity: no
          plugin_stargazers: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_stargazers_charts: yes
          plugin_stars: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_stars_limit: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && '3' || '0' }}
          plugin_repositories: yes
          plugin_repositories_featured: "wyattowalsh/agents, wyattowalsh/nbadb, wyattowalsh/proxywhirl, wyattowalsh/mcp-crawl4ai, wyattowalsh/fl-mcp, wyattowalsh/listentropy, wyattowalsh/personal-website, wyattowalsh/mdxpad, wyattowalsh/ai-web-feeds"

      - name: Collect additional metrics output
        id: collect_additional_metrics
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set -euo pipefail
          cp /metrics_renders/.github/assets/img/metrics.additional.svg ./.github/assets/img/metrics.additional.svg

      - name: Validate additional metrics output
        id: validate_additional_metrics
        if: ${{ always() }}
        continue-on-error: true
        run: uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.additional.svg

      - name: Recover additional metrics output
        id: recover_additional_metrics
        if: ${{ always() }}
        run: |
          uv run python -m scripts.metrics_svg recover \
            ./.github/assets/img/metrics.additional.svg \
            --previous "$RUNNER_TEMP/metrics-backups/metrics.additional.svg"

      - name: Generate supplemental metrics cards
        id: generate_supplemental_metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          set -euo pipefail
          uv run python -m scripts.cli generate supplemental-metrics \
            --config-path config.yaml \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --output-dir .github/assets/img \
            --manifest-path "$RUNNER_TEMP/metrics-supplemental.manifest.json" \
            --x-handle "${{ github.repository_owner }}"

      - name: Validate supplemental metrics cards
        id: validate_supplemental_metrics
        if: ${{ always() }}
        run: |
          set -euo pipefail
          uv run python -m scripts.supplemental_metrics validate \
            --output-dir .github/assets/img \
            --manifest-path "$RUNNER_TEMP/metrics-supplemental.manifest.json"

      - name: Validate final metrics assets
        id: validate_final_metrics
        if: ${{ always() }}
        run: |
          set -euo pipefail
          uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.svg
          uv run python -m scripts.metrics_svg validate ./.github/assets/img/metrics.additional.svg
          uv run python -m scripts.supplemental_metrics validate \
            --output-dir .github/assets/img \
            --manifest-path "$RUNNER_TEMP/metrics-supplemental.manifest.json"

      - name: Summarize metrics asset health
        if: ${{ always() }}
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          from scripts.metrics_svg import validate_svg_file

          for asset_name in (
              "metrics.svg",
              "metrics.additional.svg",
              "metrics-habits.svg",
              "metrics-activity.svg",
              "metrics-music.svg",
              "metrics-posts.svg",
          ):
              path = Path(".github/assets/img") / asset_name
              result = validate_svg_file(path)
              print(f"{asset_name}: status={result.status.value} detail={result.detail}")
              if asset_name in {"metrics-music.svg", "metrics-posts.svg"} and result.status.value == "missing":
                  continue
              if not result.is_valid:
                  print(f"::error::{asset_name} is in degraded state ({result.status.value}).")
          PY

      - name: Commit metrics outputs
        if: ${{ success() && steps.validate_final_metrics.outcome == 'success' }}
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail

          owned_files=(
            ./.github/assets/img/metrics.svg
            ./.github/assets/img/metrics.additional.svg
            ./.github/assets/img/metrics-habits.svg
            ./.github/assets/img/metrics-activity.svg
            ./.github/assets/img/metrics-music.svg
            ./.github/assets/img/metrics-posts.svg
          )

          if [ -z "$(git status --porcelain --untracked-files=all -- "${owned_files[@]}")" ]; then
            echo "No metrics asset changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for file in "${owned_files[@]}"; do
            if [ -e "$file" ] || git ls-files --error-unmatch "$file" >/dev/null 2>&1; then
              git add -A -- "$file"
            fi
          done
          git commit -m "chore(metrics): update generated metrics assets"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push metrics commit after ${attempt} attempts."
              exit 1
            fi

            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
          done

  generate-event-art:
    name: Generate Event-Driven Artwork
    runs-on: ubuntu-latest
    needs: update-starred-lists
    if: ${{ github.event.inputs.metrics_probe_mode != 'true' && always() && !cancelled() }}
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install librsvg for GIF rasterization
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Prepare living-art staging directory
        run: |
          mkdir -p "$RUNNER_TEMP/living-art-stage/inputs"
          mkdir -p "$RUNNER_TEMP/living-art-stage/outputs"

      - name: Fetch metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          uv run python -m scripts.fetch_metrics \
            --owner "$OWNER" \
            --repo "$REPO_NAME" \
            --output "$RUNNER_TEMP/metrics.json"
          cp "$RUNNER_TEMP/metrics.json" "$RUNNER_TEMP/living-art-stage/inputs/metrics.json"

      - name: Fetch historical data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          uv run python -m scripts.fetch_history \
            --owner "$OWNER" \
            --repo "$REPO_NAME" \
            --output "$RUNNER_TEMP/history.json"
          cp "$RUNNER_TEMP/history.json" "$RUNNER_TEMP/living-art-stage/inputs/history.json"

      - name: Resolve living-art runtime contract constants
        run: |
          uv run python - <<'PY'
          import os
          from scripts.art.timelapse import (
              DEFAULT_PUBLISHED_MAX_FRAMES,
              MIN_PUBLISHED_RUNTIME_MS,
          )

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"LIVING_ART_MAX_FRAMES={DEFAULT_PUBLISHED_MAX_FRAMES}\n")
              env_file.write(f"LIVING_ART_MIN_RUNTIME_MS={MIN_PUBLISHED_RUNTIME_MS}\n")
          PY

      - name: Generate living-art outputs (canonical timelapse GIFs)
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          uv run python -m scripts.cli generate living-art \
            --profile "$OWNER" \
            --metrics-path "$RUNNER_TEMP/metrics.json" \
            --history-path "$RUNNER_TEMP/history.json" \
            --max-frames "$LIVING_ART_MAX_FRAMES"

      - name: Validate living-art runtime and frame contracts
        run: |
          uv run python - <<'PY'
          import os
          from pathlib import Path
          from PIL import Image, ImageSequence

          max_frames = int(os.environ["LIVING_ART_MAX_FRAMES"])
          min_runtime_ms = int(os.environ["LIVING_ART_MIN_RUNTIME_MS"])
          gif_paths = sorted(Path(".github/assets/img").glob("living-*.gif"))
          if not gif_paths:
              raise SystemExit("No living-art GIF outputs found for contract validation")

          print("Living-art runtime contract summary:")
          for gif_path in gif_paths:
              with Image.open(gif_path) as img:
                  durations = []
                  for frame_index, frame in enumerate(ImageSequence.Iterator(img)):
                      raw_duration = frame.info.get("duration", 0)
                      try:
                          duration = int(raw_duration)
                      except (TypeError, ValueError):
                          duration = 0
                      if duration <= 0:
                          raise SystemExit(
                              f"{gif_path.name} frame {frame_index} has invalid duration {raw_duration!r}"
                          )
                      durations.append(duration)
              frame_count = len(durations)
              runtime_ms = sum(durations)
              print(f"- {gif_path.name}: frames={frame_count}, runtime_ms={runtime_ms}")
              if frame_count > max_frames:
                  raise SystemExit(
                      f"{gif_path.name} has {frame_count} frames, exceeds max contract {max_frames}"
                  )
              if runtime_ms < min_runtime_ms:
                  raise SystemExit(
                      f"{gif_path.name} runtime {runtime_ms}ms below contract floor {min_runtime_ms}ms"
                  )
          PY

      - name: Stage living-art timelapse outputs and index
        if: ${{ always() }}
        run: |
          shopt -s nullglob
          mkdir -p "$RUNNER_TEMP/living-art-stage/outputs/timelapse"
          mkdir -p "$RUNNER_TEMP/living-art-stage/outputs/index"
          mkdir -p "$RUNNER_TEMP/living-art-stage/outputs/docs-showcase"
          for file in .github/assets/img/living-*.gif; do
            cp "$file" "$RUNNER_TEMP/living-art-stage/outputs/timelapse/"
          done
          for file in .github/assets/img/living-art-manifest.json .github/assets/img/living-art-preview.html; do
            if [[ -f "$file" ]]; then
              cp "$file" "$RUNNER_TEMP/living-art-stage/outputs/index/"
            fi
          done
          for file in docs/public/showcase/living-*.gif; do
            cp "$file" "$RUNNER_TEMP/living-art-stage/outputs/docs-showcase/"
          done
          for file in docs/public/showcase/living-art-manifest.json docs/public/showcase/living-art-preview.html; do
            if [[ -f "$file" ]]; then
              cp "$file" "$RUNNER_TEMP/living-art-stage/outputs/docs-showcase/"
            fi
          done

      - name: Stage living-art outputs and manifest
        if: ${{ always() }}
        run: |
          {
            echo "# Living-art artifact summary"
            echo
            echo "## Inputs"
            find "$RUNNER_TEMP/living-art-stage/inputs" -type f | sort | while read -r file; do
              size=$(wc -c < "$file")
              echo "- $(basename "$file") (${size} bytes)"
            done
            echo
            echo "## Outputs"
            find "$RUNNER_TEMP/living-art-stage/outputs" -type f | sort | while read -r file; do
              size=$(wc -c < "$file")
              rel=${file#"$RUNNER_TEMP/living-art-stage/"}
              echo "- ${rel} (${size} bytes)"
            done
          } | tee "$RUNNER_TEMP/living-art-stage/manifest.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload living-art staging bundle
        if: ${{ always() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: living-art-stage-${{ github.run_id }}
          path: ${{ runner.temp }}/living-art-stage
          if-no-files-found: warn
          retention-days: 7

      - name: Commit generated art outputs
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          owned_files=(
            .github/assets/img/living-*.gif
            .github/assets/img/living-art-manifest.json
            .github/assets/img/living-art-preview.html
            docs/public/showcase/living-*.gif
            docs/public/showcase/living-art-manifest.json
            docs/public/showcase/living-art-preview.html
          )
          if [ -z "$(git status --porcelain --untracked-files=all -- "${owned_files[@]}")" ]; then
            echo "No living-art changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- "${owned_files[@]}"
          git commit -m "art: regenerate living-art assets"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push living-art commit after ${attempt} attempts."
              exit 1
            fi

            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
          done

  update-skills:
    name: Finalize README Sections
    runs-on: ubuntu-latest
    needs:
      - update-readme-wakatime
      - generate-profile-metrics
    if: ${{ github.event.inputs.metrics_probe_mode != 'true' && !cancelled() && needs.update-readme-wakatime.result == 'success' && needs.generate-profile-metrics.result == 'success' }}
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Generate README Sections
        run: uv run python -m scripts.cli generate readme-sections --config-path config.yaml

      - name: Generate Skills Badges
        run: uv run python -m scripts.cli generate skills --skills-path skills.yaml

      - name: Commit README updates
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          owned_files=(README.md .github/assets/img/readme/*.svg)
          if [ -z "$(git status --porcelain --untracked-files=all -- "${owned_files[@]}")" ]; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- "${owned_files[@]}"
          git commit -m "chore(readme): update dynamic sections and skills badges"

          for attempt in 1 2 3; do
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push README update commit after ${attempt} attempts."
              exit 1
            fi

            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"
          done
