<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="360" height="216" viewBox="0 0 360 216" role="img" aria-label="proxywhirl">
<defs>
<style>
:root {
  --card-bg: #ffffff;
  --card-border: #d0d7de;
  --title-color: #0969da;
  --text-color: #656d76;
  --meta-color: #656d76;
  --stat-color: #656d76;
  --accent: #0969da;
  --spark-stroke: #0969da;
}
@media (prefers-color-scheme: dark) { :root {
  --card-bg: #0d1117;
  --card-border: #30363d;
  --title-color: #58a6ff;
  --text-color: #8b949e;
  --meta-color: #8b949e;
  --stat-color: #8b949e;
  --accent: #58a6ff;
  --spark-stroke: #58a6ff;
}}
.rc-bg { fill: var(--card-bg); }
.rc-border { stroke: var(--card-border); }
.rc-title { fill: var(--title-color); font: 600 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif; }
.rc-desc { fill: var(--text-color); font: 400 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif; }
.rc-meta { fill: var(--stat-color); font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif; }
.rc-lang-dot { stroke: none; }
.rc-lang-label { fill: var(--meta-color); font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif; }
.sparkline { fill: none; stroke: var(--spark-stroke); stroke-width: 2; opacity: 0.88; }
</style>
<clipPath id="card-clip"><rect width="360" height="216" rx="10" /></clipPath>
<filter id="shadow" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.06"/><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.04"/></filter><linearGradient id="glass-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.04" /><stop offset="100%" stop-color="#ffffff" stop-opacity="0" /></linearGradient>
</defs>
<rect class="rc-bg" width="360" height="216" rx="10" fill="var(--card-bg)" filter="url(#shadow)" />
<rect width="360" height="216" rx="10" fill="url(#glass-grad)" />
<rect class="rc-border" x="0.5" y="0.5" width="359" height="215" rx="10" fill="none" stroke-width="1" />
<rect x="1.5" y="1.5" width="357" height="213" rx="9" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
<rect x="0" y="0" width="360" height="3" fill="var(--spark-stroke)" clip-path="url(#card-clip)" />
