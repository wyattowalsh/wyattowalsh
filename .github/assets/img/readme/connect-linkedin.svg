<svg xmlns="http://www.w3.org/2000/svg" width="140" height="130" viewBox="0 0 140 130" role="img" aria-label="LinkedIn">
<defs><style>
:root {
  --card-border: #d0d7de;
  --title-color: #1f2328;
  --text-color: #656d76;
  --meta-color: #656d76;
}
@media (prefers-color-scheme: dark) { :root {
  --card-border: #30363d;
  --title-color: #e6edf3;
  --text-color: #8b949e;
  --meta-color: #8b949e;
}}
.con-title { fill: var(--title-color); font: 600 14px/1.25 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
.con-sub { fill: var(--meta-color); font: 400 11px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; text-transform: uppercase; letter-spacing: 0.06em; }}
.con-mono { fill: var(--meta-color); font: 700 18px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
</style>
<clipPath id="bar-clip"><rect width="140" height="130" rx="12"/></clipPath>
<clipPath id="ico-clip"><rect x="46" y="18" width="48" height="48" rx="12" /></clipPath>
</defs>
<rect x="0.5" y="0.5" width="139" height="129" rx="12" fill="none" stroke="var(--card-border)" stroke-width="1" />
<rect x="0" y="0" width="140" height="3" fill="#0A66C2" clip-path="url(#bar-clip)"/>
<image href="data:image/svg+xml;base64," x="46" y="18" width="48" height="48" preserveAspectRatio="xMidYMid meet" clip-path="url(#ico-clip)" />
<text class="con-title" x="70" y="84" text-anchor="middle">LinkedIn</text>
<text class="con-sub" x="70" y="100" text-anchor="middle">SOCIAL</text>
</svg>