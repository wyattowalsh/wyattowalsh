<text class="rc-title" x="44" y="33" style="font: 600 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;">proxywhirl</text>
<text class="rc-desc" x="20" y="64" style="font: 400 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;">Live stats are temporarily unavailable.</text>
<text class="rc-desc" x="20" y="80" style="font: 400 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;">Open the repository for full details.</text>
</svg>