<path d="M341.5,407.6 Q343.3,408.1 344.0,409.1" fill="none" stroke="#005b8a" stroke-width="1.12" opacity="0.166" stroke-linecap="round" class="branch-path" style="--op:0.166;animation-delay:6.3s"/>
