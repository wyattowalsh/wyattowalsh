<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
<defs>
  <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b1"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b2"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b3"/>
    <feColorMatrix in="b3" type="matrix" result="bright"
      values="1.6 0 0 0 0.1  0 1.6 0 0 0.1  0 0 1.6 0 0.1  0 0 0 0.5 0"/>
    <feMerge>
      <feMergeNode in="bright"/><feMergeNode in="b2"/>
      <feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="softBloom" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b1"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b2"/>
    <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b3"/>
    <feColorMatrix in="b3" type="matrix" result="bright"
      values="1.6 0 0 0 0.1  0 1.6 0 0 0.1  0 0 1.6 0 0.1  0 0 0 0.5 0"/>
    <feMerge>
      <feMergeNode in="bright"/><feMergeNode in="b2"/>
      <feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="8"/>
    <feColorMatrix type="matrix"
      values="1.5 0 0 0 0.1  0 1.5 0 0 0.1  0 0 1.5 0 0.1  0 0 0 0.6 0"/>
  </filter>
  <radialGradient id="bg" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#040410"/>
    <stop offset="100%" stop-color="#010108"/>
  </radialGradient>
  <radialGradient id="vig" cx="50%" cy="50%" r="55%">
    <stop offset="35%" stop-color="black" stop-opacity="0"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.6"/>
  </radialGradient>
</defs>
<style>
  @keyframes sprout {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes breathe {
    0%, 100% { opacity: var(--op); }
    50% { opacity: calc(var(--op) * 1.3); }
  }
  @keyframes starBurst {
    0% { r: 0; opacity: 0.8; }
    50% { opacity: 0.4; }
    100% { r: var(--burst-r); opacity: 0; }
  }
  .organism {
    transform-origin: var(--ox) var(--oy);
    animation: sprout 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    opacity: 0;
  }
  .branch-path {
    animation: breathe 6s ease-in-out infinite;
  }
  .star-ring {
    animation: starBurst 4s ease-out infinite;
  }
</style>
<rect width="800" height="800" fill="url(#bg)"/>
<g opacity="0.06">
<circle cx="400.0" cy="400.0" r="30" fill="none" stroke="#00292c" stroke-width="0.8"/>
</g>
<circle cx="443" cy="474" r="108" fill="#220000" opacity="0.04"/>
<circle cx="314" cy="400" r="108" fill="#00111d" opacity="0.04"/>
<circle cx="443" cy="326" r="108" fill="#230000" opacity="0.04"/>
<g filter="url(#bloom)">
<g class="organism" style="animation-delay:0.00s;--ox:427px;--oy:441px">
