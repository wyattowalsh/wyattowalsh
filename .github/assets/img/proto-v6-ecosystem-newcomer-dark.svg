<path d="M425.1,438.5 Q424.1,437.6 424.7,436.2" fill="none" stroke="#853800" stroke-width="1.14" opacity="0.177" stroke-linecap="round" class="branch-path" style="--op:0.177;animation-delay:0.3s"/>
<circle cx="427.0" cy="441.1" r="4.6" fill="#d7773c" opacity="0.102" filter="url(#glow)"/>
</g>
