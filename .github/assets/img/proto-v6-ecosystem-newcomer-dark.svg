<path d="M427.0,441.1 Q425.7,440.7 425.1,438.5" fill="none" stroke="#8c2e00" stroke-width="1.34" opacity="0.204" stroke-linecap="round" class="branch-path" style="--op:0.204;animation-delay:0.0s"/>
