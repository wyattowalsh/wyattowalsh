.rc-lang-dot { stroke: none; }
.rc-lang-label { fill: var(--stat-color); font: 400 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
</style>
