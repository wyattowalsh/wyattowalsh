<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="480" height="150" viewBox="0 0 480 150" role="img" aria-label="ProxyWhirl">
<defs><style>
:root {
  --card-border: #d0d7de;
  --title-color: #0969da;
  --text-color: #656d76;
  --meta-color: #656d76;
  --accent: #0969da;
}
@media (prefers-color-scheme: dark) { :root {
  --card-border: #30363d;
  --title-color: #58a6ff;
  --text-color: #8b949e;
  --meta-color: #8b949e;
  --accent: #58a6ff;
}}
.blog-title { fill: var(--title-color); font: 600 16px/1.25 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
.blog-desc { fill: var(--text-color); font: 400 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
.blog-meta { fill: var(--meta-color); font: 400 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
</style>
<clipPath id="bar-clip"><rect width="480" height="150" rx="10"/></clipPath>
<clipPath id="hero-clip"><rect x="352" y="18" width="110" height="68" rx="8" /></clipPath>
</defs>
<rect x="0.5" y="0.5" width="479" height="149" rx="10" fill="none" stroke="var(--card-border)" stroke-width="1" />
<rect x="0" y="0" width="480" height="3" fill="var(--accent)" clip-path="url(#bar-clip)"/>
<image href="data:image/svg+xml;base64," x="352" y="18" width="110" height="68" preserveAspectRatio="xMidYMid slice" clip-path="url(#hero-clip)" />
<rect x="352" y="18" width="110" height="68" rx="8" fill="none" stroke="var(--card-border)" stroke-opacity="0.5" stroke-width="1" />
<text class="blog-title" x="20" y="32">ProxyWhirl</text>
<text class="blog-desc" x="20" y="52">Explore articles about software development,</text>
<text class="blog-desc" x="20" y="68">web technologies, and technical insights</text>
<rect x="20" y="120" width="60" height="2" rx="1" fill="var(--accent)" fill-opacity="0.3" />
<text class="blog-meta" x="20" y="136">w4w.dev</text>
</svg>