<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="480" height="150" viewBox="0 0 480 150" role="img" aria-label="Personal Web App v6">
<defs><style>
:root {
  --card-bg: transparent;
  --card-border: #d0d7de;
  --title-color: #0969da;
  --text-color: #656d76;
  --meta-color: #656d76;
  --accent: #0969da;
}
@media (prefers-color-scheme: dark) { :root {
  --card-bg: transparent;
  --card-border: #30363d;
  --title-color: #58a6ff;
  --text-color: #8b949e;
  --meta-color: #8b949e;
  --accent: #58a6ff;
}}
.rc-bg { fill: transparent; }
.rc-border { stroke: #d0d7de; }
@media (prefers-color-scheme: dark) {
  .rc-bg { fill: transparent; }
  .rc-border { stroke: #30363d; }
}
.blog-title { fill: var(--title-color); font: 600 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif; }
.blog-desc { fill: var(--text-color); font: 400 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif; }
.blog-meta { fill: var(--meta-color); font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif; }
</style>
<clipPath id="bar-clip"><rect width="480" height="150" rx="10"/></clipPath><filter id="shadow" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.06"/><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.04"/></filter><linearGradient id="glass-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.04" /><stop offset="100%" stop-color="#ffffff" stop-opacity="0" /></linearGradient><linearGradient id="footer-div-grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="var(--accent)" stop-opacity="0.5" /><stop offset="100%" stop-color="var(--accent)" stop-opacity="0" /></linearGradient>
</defs>
<rect class="rc-bg" width="480" height="150" rx="10" fill="transparent" filter="url(#shadow)" />
<rect width="480" height="150" rx="10" fill="url(#glass-grad)" />
<rect class="rc-border" x="0.5" y="0.5" width="479" height="149" rx="10" fill="none" stroke-width="1" />
<rect x="1.5" y="1.5" width="477" height="147" rx="9" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
<rect x="0" y="0" width="480" height="3" fill="var(--accent)" clip-path="url(#bar-clip)" />
<text class="blog-title" x="20" y="34">Personal Web App v6</text>
<text class="blog-desc" x="20" y="62">A deep dive into building my personal website v6 with</text>
<text class="blog-desc" x="20" y="78">Next.js 15, featuring MDX blog posts, theme-aware</text>
<text class="blog-desc" x="20" y="94">components, and modern web development practices.</text>
<rect x="20" y="120" width="80" height="1.5" rx="0.5" fill="url(#footer-div-grad)" />
<text class="blog-meta" x="20" y="136">Published 2024-12-01 · w4w.dev</text>
</svg>