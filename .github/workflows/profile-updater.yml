name: Unified Profile Updater

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *" # Run once a day at 1 AM UTC
  push:
    branches:
      - master
      - main
      - dev

concurrency:
  group: profile-updater-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-starred-lists:
    name: Update Starred Repository Lists (MD Files)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # To commit languages.md and topics.md
    outputs:
      starred_lists_changed: ${{ steps.commit_starred_lists.outputs.changes_detected }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install script-tools dependencies
        run: uv sync --extra script-tools

      - name: Get repository name
        id: get_repo_name
        run: echo "REPOSITORY_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Update repo category by language
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ steps.get_repo_name.outputs.REPOSITORY_NAME }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          uv run starred --username ${USERNAME} --repository ${REPOSITORY} --sort \
            --message 'chore(data): update awesome-stars languages.md' \
            --filename ./.github/assets/languages.md

      - name: Update repo category by topic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ steps.get_repo_name.outputs.REPOSITORY_NAME }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          uv run starred --username ${USERNAME} --repository ${REPOSITORY} --sort \
            --message 'chore(data): update awesome-stars topics.md' \
            --topic --topic_limit 500 \
            --filename ./.github/assets/topics.md

      - name: Commit updated starred lists
        id: commit_starred_lists
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(data): update awesome-stars lists (languages.md, topics.md)"
          file_pattern: ".github/assets/languages.md .github/assets/topics.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  generate-assets:
    name: Generate Profile Assets (QR, WordClouds, Banner)
    runs-on: ubuntu-latest
    needs: update-starred-lists # Depends on the md files being up-to-date
    timeout-minutes: 20
    permissions:
      contents: write # To commit generated image assets
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with: # Ensure we fetch the commit made by update-starred-lists if it ran
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install asset generation dependencies
        run: uv sync --extra qr --extra word-clouds

      - name: Generate QR Code
        run: uv run python -m scripts.cli generate qr --config-path config.yaml

      - name: Generate Word Cloud by Topic
        run: |
          uv run python -m scripts.cli generate word-cloud \
            --config-path config.yaml \
            --from-topics-md \
            --output-path .github/assets/img/wordcloud_wordle_by_topics.svg

      - name: Generate Word Cloud by Language
        run: |
          uv run python -m scripts.cli generate word-cloud \
            --config-path config.yaml \
            --from-languages-md \
            --output-path .github/assets/img/wordcloud_wordle_by_languages.svg

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(assets): update generated profile assets"
          file_pattern: ".github/assets/img/qr*.png .github/assets/img/wordcloud_*.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  update-readme-wakatime:
    name: Update README - WakaTime Stats
    runs-on: ubuntu-latest
    needs: generate-event-art
    if: ${{ always() && !cancelled() }}
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Preflight WakaTime auth gate
        id: wakatime_auth
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          set -euo pipefail
          has_wakatime_api_key=false
          [ -n "${WAKATIME_API_KEY:-}" ] && has_wakatime_api_key=true
          echo "has_wakatime_api_key=${has_wakatime_api_key}" >> "$GITHUB_OUTPUT"
          if [ "${has_wakatime_api_key}" != "true" ]; then
            echo "::notice::WAKATIME_API_KEY is missing; skipping WakaTime README update."
          fi
      - name: WakaTime Readme Stats
        if: ${{ steps.wakatime_auth.outputs.has_wakatime_api_key == 'true' }}
        uses: anmol098/waka-readme-stats@2c04c57e0ee35e9e40aef7fbc7d866d063dcf7cd # v4
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PUSH_BRANCH_NAME: ${{ github.ref_name }} # Removed invalid input
          # ... other params from your waka.yml ...
          SHOW_LINES_OF_CODE: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_LOC_CHART: "True"

  update-readme-blog:
    name: Update README - Latest Blog Posts
    runs-on: ubuntu-latest
    needs: update-readme-wakatime
    if: ${{ always() && !cancelled() }}
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Blog Post Workflow
        uses: gautamkrishnar/blog-post-workflow@71dc71018921efdf8a81745f431f32c989f699a7 # v1
        with:
          feed_list: "https://w4w.dev/feed.xml"
          # ... other params from your blog-post-workflow.yml ...
          template: "$newline - $date - [$title]($url)"
          commit_message: "chore(readme): update blog posts section" # Example of specific commit message

  generate-profile-metrics:
    name: Generate Profile Metrics SVGs
    runs-on: ubuntu-latest
    needs: generate-assets
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Preflight metrics auth gates
        id: metrics_auth
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          # Secret setup guidance:
          # - METRICS_TOKEN: GitHub PAT (classic) with at least read:user, public_repo (add read:org for org/collab visibility).
          has_metrics_token=false
          [ -n "${METRICS_TOKEN:-}" ] && has_metrics_token=true
          has_spotify_tokens=false
          if [ -n "${SPOTIFY_CLIENT_ID:-}" ] && [ -n "${SPOTIFY_CLIENT_SECRET:-}" ] && [ -n "${SPOTIFY_REFRESH_TOKEN:-}" ]; then
            has_spotify_tokens=true
          fi
          echo "has_metrics_token=${has_metrics_token}" >> "$GITHUB_OUTPUT"
          echo "has_spotify_tokens=${has_spotify_tokens}" >> "$GITHUB_OUTPUT"
          if [ "${has_metrics_token}" != "true" ]; then
            echo "::notice::METRICS_TOKEN is missing; repositories-sensitive metrics are disabled."
          fi
          if [ "${has_spotify_tokens}" != "true" ]; then
            echo "::notice::Spotify secrets are incomplete; music metrics are disabled."
          fi
      - name: Personal metrics
        id: personal_metrics
        continue-on-error: true
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: .github/assets/img/metrics.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'header, activity, community, repositories, metadata' || 'header, activity, community, metadata' }}
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_traffic: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_languages: yes
          plugin_languages_ignored: "jupyter%20notebook"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_threshold: "2%"
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_notable: yes
          plugin_notable_repositories: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_gists: yes
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_limit: 15
          config_timezone: America/Los_Angeles
          config_padding: 10%

      - name: Check personal metrics output
        id: check_personal_metrics
        if: ${{ always() }}
        run: |
          AUTH_ERROR_PATTERN="Insufficient token scopes|Repository and collaborations sections disabled|API error:[[:space:]]*(401|403)|Bad credentials|authentication( failed| error)?|forbidden|unauthorized"
          if [ ! -f ./.github/assets/img/metrics.svg ]; then
            echo "needs_fallback=true" >> "$GITHUB_OUTPUT"
          elif ! grep -Eiq "<svg[^>]*>" ./.github/assets/img/metrics.svg || ! grep -Eiq "</svg>" ./.github/assets/img/metrics.svg || grep -Eiq "${AUTH_ERROR_PATTERN}" ./.github/assets/img/metrics.svg; then
            echo "needs_fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Personal metrics (fallback without repositories)
        if: ${{ steps.personal_metrics.outcome != 'success' || steps.check_personal_metrics.outputs.needs_fallback == 'true' }}
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: .github/assets/img/metrics.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: "header, activity, community, metadata"
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_traffic: no
          plugin_languages: yes
          plugin_languages_ignored: "jupyter%20notebook"
          plugin_languages_details: "bytes-size, percentage"
          plugin_languages_threshold: "2%"
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_notable: yes
          plugin_gists: yes
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_limit: 15
          config_timezone: America/Los_Angeles
          config_padding: 10%

      - name: Personal metrics (additional)
        id: personal_metrics_additional
        continue-on-error: true
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: .github/assets/img/metrics.additional.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          config_timezone: America/Los_Angeles
          config_padding: 10%
          plugin_music: ${{ steps.metrics_auth.outputs.has_spotify_tokens == 'true' && 'yes' || 'no' }}
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_token: "${{ secrets.SPOTIFY_CLIENT_ID }}, ${{ secrets.SPOTIFY_CLIENT_SECRET }}, ${{ secrets.SPOTIFY_REFRESH_TOKEN }}"
          plugin_music_limit: 5
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_stargazers: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_stargazers_charts: yes
          plugin_stars: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_stars_limit: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && '3' || '0' }}
          plugin_repositories: yes
          plugin_repositories_featured: "wyattowalsh/listentropy, wyattowalsh/mdxpad, wyattowalsh/proxywhirl, wyattowalsh/nbadb, wyattowalsh/agents, wyattowalsh/personal-website, wyattowalsh/riso, wyattowalsh/iina-plugin-bookmarks"

      - name: Check additional metrics output
        id: check_additional_metrics
        if: ${{ always() }}
        run: |
          AUTH_ERROR_PATTERN="Insufficient token scopes|Repository and collaborations sections disabled|API error:[[:space:]]*(401|403)|Bad credentials|authentication( failed| error)?|forbidden|unauthorized"
          if [ ! -f ./.github/assets/img/metrics.additional.svg ]; then
            echo "needs_fallback=true" >> "$GITHUB_OUTPUT"
          elif ! grep -Eiq "<svg[^>]*>" ./.github/assets/img/metrics.additional.svg || ! grep -Eiq "</svg>" ./.github/assets/img/metrics.additional.svg || grep -Eiq "${AUTH_ERROR_PATTERN}" ./.github/assets/img/metrics.additional.svg; then
            echo "needs_fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Personal metrics (additional fallback)
        if: ${{ steps.personal_metrics_additional.outcome != 'success' || steps.check_additional_metrics.outputs.needs_fallback == 'true' }}
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          filename: .github/assets/img/metrics.additional.svg
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          config_timezone: America/Los_Angeles
          config_padding: 10%
          plugin_music: ${{ steps.metrics_auth.outputs.has_spotify_tokens == 'true' && 'yes' || 'no' }}
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_token: "${{ secrets.SPOTIFY_CLIENT_ID }}, ${{ secrets.SPOTIFY_CLIENT_SECRET }}, ${{ secrets.SPOTIFY_REFRESH_TOKEN }}"
          plugin_music_limit: 5
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_stargazers: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_stargazers_charts: yes
          plugin_stars: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && 'yes' || 'no' }}
          plugin_stars_limit: ${{ steps.metrics_auth.outputs.has_metrics_token == 'true' && '3' || '0' }}
          plugin_repositories: yes
          plugin_repositories_featured: "wyattowalsh/listentropy, wyattowalsh/mdxpad, wyattowalsh/proxywhirl, wyattowalsh/nbadb, wyattowalsh/agents, wyattowalsh/personal-website, wyattowalsh/riso, wyattowalsh/iina-plugin-bookmarks"

      - name: Sanitize final metrics SVG outputs
        if: ${{ always() }}
        run: |
          set -euo pipefail
          AUTH_ERROR_PATTERN="Insufficient token scopes|Repository and collaborations sections disabled|API error:[[:space:]]*(401|403)|Bad credentials|authentication( failed| error)?|forbidden|unauthorized"

          sanitize_svg() {
            local file="$1"
            local label="${2:-$(basename "$file")}"
            local reason=""

            if [ ! -e "$file" ]; then
              reason="file does not exist"
            elif [ ! -s "$file" ]; then
              reason="file is empty (0 bytes)"
            elif ! grep -Eiq "<svg[^>]*>" "$file"; then
              reason="missing <svg> opening tag"
            elif ! grep -Eiq "</svg>" "$file"; then
              reason="missing </svg> closing tag"
            elif grep -Eiq "${AUTH_ERROR_PATTERN}" "$file"; then
              reason="SVG contains auth/error message: $(grep -Eio "${AUTH_ERROR_PATTERN}" "$file" | head -1)"
            fi

            if [ -n "$reason" ]; then
              echo "::notice::Sanitizing ${label}: ${reason}. Replacing with placeholder SVG."
              cat > "$file" <<'SVGEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" role="img" aria-label="Metrics unavailable">
            <rect width="100%" height="100%" rx="8" fill="#0d1117"/>
            <text x="50%" y="45%" fill="#c9d1d9" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="22">Metrics temporarily unavailable</text>
            <text x="50%" y="65%" fill="#8b949e" dominant-baseline="middle" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14">Check workflow logs for details</text>
          </svg>
          SVGEOF
              # Verify the placeholder is well-formed
              if ! grep -q '</svg>' "$file"; then
                echo "::error::Failed to write valid placeholder SVG to ${label}"
                return 1
              fi
            else
              echo "::notice::${label} passed SVG validation."
            fi
          }

          sanitize_svg ./.github/assets/img/metrics.svg "metrics.svg"
          sanitize_svg ./.github/assets/img/metrics.additional.svg "metrics.additional.svg"

      - name: Commit metrics outputs
        if: ${{ always() }}
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(metrics): update generated metrics assets"
          file_pattern: ".github/assets/img/metrics.svg .github/assets/img/metrics.additional.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  generate-event-art:
    name: Generate Event-Driven Artwork
    runs-on: ubuntu-latest
    needs: generate-profile-metrics
    if: ${{ always() && needs.generate-profile-metrics.result != 'cancelled' }}
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Fetch metrics and generate artwork
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          uv run python -m scripts.fetch_metrics \
            --owner "$OWNER" \
            --repo "$REPO_NAME" \
            --output "$RUNNER_TEMP/metrics.json"
          uv run python -m scripts.cli generate generative \
            --metrics-path "$RUNNER_TEMP/metrics.json"

      - name: Fetch historical data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          uv run python -m scripts.fetch_history \
            --owner "$OWNER" \
            --repo "$REPO_NAME" \
            --output "$RUNNER_TEMP/history.json"

      - name: Generate animated artwork
        run: |
          uv run python -m scripts.cli generate animated \
            --history-path "$RUNNER_TEMP/history.json"

      - name: Generate living-art outputs (timeline SVG + GIF compatibility)
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          uv run python -m scripts.cli generate living-art \
            --profile "$OWNER" \
            --metrics-path "$RUNNER_TEMP/metrics.json" \
            --history-path "$RUNNER_TEMP/history.json"

      - name: Commit generated art outputs
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "art: regenerate event-driven, animated, and living-art outputs"
          file_pattern: ".github/assets/img/generative-*.svg .github/assets/img/animated-*.svg .github/assets/img/animated-*.gif .github/assets/img/*-growth.gif .github/assets/img/*-growth-animated.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  update-skills:
    name: Finalize README Sections
    runs-on: ubuntu-latest
    needs: update-readme-blog
    if: ${{ always() && !cancelled() }}
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Generate README Sections
        run: uv run python -m scripts.cli generate readme-sections --config-path config.yaml

      - name: Generate Skills Badges
        run: uv run python -m scripts.cli generate skills --skills-path skills.yaml

      - name: Commit README updates
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(readme): update dynamic sections and skills badges"
          file_pattern: "README.md .github/assets/img/readme/*.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
